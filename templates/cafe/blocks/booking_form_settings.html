{% load wagtailcore_tags %}
<div class="form-group form_item">
    <label for="id_name">{{ value.name_label }}</label>
    <input type="text" 
           name="name" 
           id="id_name" 
           class="form-control" 
           placeholder="{{ value.name_placeholder }}" 
           value="{{ form_data.name|default:'' }}"
           required>
</div>

<div class="form-group form_item">
    <label for="id_phone">{{ value.phone_label }}</label>
    <input type="tel" 
           name="phone" 
           id="id_phone" 
           class="form-control" 
           placeholder="{{ value.phone_placeholder }}" 
           value="{{ form_data.phone|default:'' }}"
           required>
</div>

<div class="row-form">
    <div class="col-md-6">
        <div class="form-group form_item">
            <label for="id_date">{{ value.date_label }}</label>
            <input type="date" 
                   name="booking_date" 
                   id="id_date" 
                   class="form-control" 
                   value="{{ form_data.booking_date|default:'' }}"
                   required>
        </div>
    </div>
    <div class="col-md-6">
        <div class="form-group form_item">
            <label for="id_time">{{ value.time_label }}</label>
            <input type="time" 
                   name="booking_time" 
                   id="id_time" 
                   class="form-control" 
                   value="{{ form_data.booking_time|default:'' }}"
                   required>
        </div>
    </div>
</div>

<div class="form-group form_item">
    <label for="id_persons">{{ value.persons_label }}</label>
    <input type="number" 
           name="persons" 
           id="id_persons" 
           class="form-control" 
           min="1" 
           max="20" 
           placeholder="{{ value.persons_placeholder }}" 
           value="{{ form_data.persons|default:'' }}"
           required>
</div>

<div class="form-group form_item-textarea">
    <label for="id_wishes">{{ value.wishes_label }}</label>
    <textarea name="wishes" 
              id="id_wishes" 
              class="form-control" 
              rows="4" 
              placeholder="{{ value.wishes_placeholder }}">{{ form_data.wishes|default:'' }}</textarea>
</div>
